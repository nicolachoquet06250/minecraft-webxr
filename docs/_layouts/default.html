<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Begin Jekyll SEO tag v2.8.0 -->
    <meta name="generator" content="Jekyll v3.10.0">
    <meta property="og:title" content="{{ page.title || default: site.title }}">
    <meta property="og:locale" content="en_US">
    <meta name="description" content="{{ site.description }}">
    <meta property="og:description" content="{{ site.description }}">
    <link rel="canonical" href="{{ page.url }}">
    <meta property="og:url" content="{{ page.url }}">
    <meta property="og:site_name" content="{{ page.title | default: site.title }}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta property="twitter:title" content="{{ page.title | default: site.title }}">
    <script type="application/ld+json">
    {
      "@context":"https://schema.org",
      "@type":"WebPage",
      "description":"{{ site.description }}",
      "headline":"{{ page.title || default: site.title }}",
      "url":"{{ page.url }}"
    }
    </script>
    <!-- End Jekyll SEO tag -->

    <style class="anchorjs"></style>
    <link rel="stylesheet" href="/minecraft-webxr/assets/css/style.css?v=c55cc4dbcb0fa9d06eed29750def221dd60c2a6b">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      pre {
        padding: 1rem;
        overflow: auto;
        background: #f6f8fa;
        border-radius: 6px;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, SFMono, Consolas, "Liberation Mono", monospace;
      }

      img {
        max-width: 100%;
      }

      .mermaid {
        margin: 1.5rem 0;
        padding: 1rem;
        overflow-x: auto;
        background: #ffffff;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        display: flex;
        justify-contents: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="container-lg px-3 my-5 markdown-body">
      {{ content }}
    </div>

    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

      mermaid.initialize({
        startOnLoad: false,
        theme: "default",
        securityLevel: "strict"
      });

      document.addEventListener("DOMContentLoaded", async () => {
        const blocks = document.querySelectorAll("pre > code.language-mermaid");

        for (const block of blocks) {
          const pre = block.parentElement;
          const container = document.createElement("div");

          container.className = "mermaid";
          container.textContent = block.textContent;
          pre.replaceWith(container);
        }

        await mermaid.run({
          querySelector: ".mermaid"
        });
      });
    </script>
  </body>
</html>
