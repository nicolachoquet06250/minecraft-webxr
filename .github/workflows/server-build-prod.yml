name: "Server Build Prod (Linux + Windows)"

"on":
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "src/**"
      - "scripts/**"
      - "public/**"
      - "wasm/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "*.html"
      - "*.ts"
      - "*.json"
      - ".github/workflows/server-build-prod.yml"
  workflow_dispatch:

permissions:
  contents: write

"jobs":
  build-server:
    name: Build server on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Build front
        run: npm run build

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build server (release)
        run: cargo build --manifest-path server/Cargo.toml --release --features embed_front

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/voxicraft_server dist/voxicraft_server
          tar -czf dist/voxicraft-server-linux-x86_64.tar.gz -C dist voxicraft_server

      - name: Upload Linux artifact voxicraft_server
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: voxicraft-server-linux-x86_64
          path: dist/voxicraft-server-linux-x86_64.tar.gz
          if-no-files-found: error

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\voxicraft_server.exe dist\voxicraft_server.exe
          Compress-Archive -Path dist\voxicraft_server.exe -DestinationPath dist\voxicraft-server-windows-x86_64.zip -Force

      - name: Upload Windows artifact  voxicraft_server
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: voxicraft-server-windows-x86_64
          path: dist/voxicraft-server-windows-x86_64.zip
          if-no-files-found: error

  publish-downloadable-packages:
    name: Publish prod downloadable binaries
    needs: build-server
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Linux build artifact
        uses: actions/download-artifact@v4
        with:
          name: voxicraft-server-linux-x86_64
          path: dist/linux

      - name: Download Windows build artifact
        uses: actions/download-artifact@v4
        with:
          name: voxicraft-server-windows-x86_64
          path: dist/windows

      - name: Read server version from Cargo.toml
        id: server_version
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version = ' server/Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')
          if [[ -z "$VERSION" ]]; then
            echo "Unable to read server version from Cargo.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=server-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish/update prod release assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.server_version.outputs.tag }}
          name: server v${{ steps.server_version.outputs.version }}
          prerelease: false
          artifacts: dist/linux/voxicraft-server-linux-x86_64.tar.gz,dist/windows/voxicraft-server-windows-x86_64.zip
          body: |
            Downloadable server executables for production.
            Version: ${{ steps.server_version.outputs.version }}
            Commit: ${{ github.sha }}
